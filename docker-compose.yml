services:
  postgres:
    image: postgres:16
    container_name: postgres_test
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: redis_test
    ports:
      - "6379:6379"
