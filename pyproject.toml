[tool.uv.workspace]
members = [
    "apps/transcribe-ai-api",
    "apps/mono-voice-worker",
    "apps/multi-voice-worker",
    "transcribe-ai-shared",
]

[dependency-groups]
dev = [
    "poethepoet>=0.37,<1",
    "pre-commit>=4,<5",
    "pytest>=8,<10",
]

[tool.poe.tasks]
api = "python apps/transcribe-ai-api/src/main.py"
mono-voice = "python apps/mono-voice-worker/src/main.py"
multi-voice = "python apps/multi-voice-worker/src/main.py"
test = "pytest"
pre-commit = "pre-commit run --all-files"
