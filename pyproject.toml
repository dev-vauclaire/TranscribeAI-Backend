[tool.uv.workspace]
members = [
    "apps/transcribe-ai-api",
    "apps/mono-voice-worker",
    "apps/multi-voice-worker",
    "transcribe-ai-shared",
]

[dependency-groups]
dev = [
    "pre-commit>=4,<5",
    "pytest>=8,<10",
    "testcontainers[postgres,redis]>=4.14.2",
]

[tool.pytest.ini_options]
testpaths = [
    "apps/*/tests",
    "transcribe-ai-shared/tests",
]
markers = [
    "unit: isolated tests without external services or I/O boundaries",
    "integration: tests involving several components or an I/O boundary",
]
